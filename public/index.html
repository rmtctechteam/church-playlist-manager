<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Church Playlist Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><a id="home-link">Church Playlist Manager</a></h1>
    <nav class="tab-bar hidden">
      <button class="tab" data-tab="playlists">Service Playlists</button>
      <button class="tab" data-tab="songs">Songs</button>
    </nav>
  </header>
  <main>
    <!-- Home view -->
    <div id="home-view">
      <h2 class="home-title">Church Playlist Manager</h2>
      <p class="home-subtitle">Manage worship services, playlists, and songs</p>
      <div class="bento-grid">
        <div class="bento-card bento-card-create" id="bento-create-playlist">
          <span class="bento-icon">+</span>
          <span class="bento-label">Create Playlist</span>
          <span class="bento-description">Start a new service playlist</span>
        </div>
        <div class="bento-card bento-card-playlists" id="bento-list-playlists">
          <span class="bento-icon">&#9835;</span>
          <span class="bento-label">List Playlists</span>
          <span class="bento-description">View and manage service playlists</span>
        </div>
        <div class="bento-card bento-card-songs" id="bento-all-songs">
          <span class="bento-icon">&#9833;</span>
          <span class="bento-label">All Songs</span>
          <span class="bento-description">Browse the full song library</span>
        </div>
      </div>
    </div>

    <!-- Songs tab -->
    <div id="songs-tab" class="hidden">
      <div class="songs-split-panel">
        <div class="songs-left-panel">
          <div class="search-bar">
            <input type="text" id="search-input" placeholder="Search songs..." autocomplete="off">
          </div>
          <div class="songs-controls">
            <select id="song-filter">
              <option value="all">All Songs</option>
              <option value="7">Last Week</option>
              <option value="30">Last Month</option>
              <option value="90">Last 3 Months</option>
            </select>
            <select id="song-sort">
              <option value="title-az">Title A-Z</option>
              <option value="title-za">Title Z-A</option>
              <option value="last-used">Last Used</option>
              <option value="most-used">Most Used</option>
            </select>
          </div>
          <ul id="song-list"></ul>
        </div>
        <div class="songs-right-panel" id="song-detail-panel">
          <div class="song-detail-placeholder">
            <p>Select a song to view details</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Playlists tab -->
    <div id="playlists-tab" class="hidden">
      <div id="playlist-list-view">
        <div class="playlist-header">
          <h2>Service Playlists</h2>
          <button id="new-playlist-btn" class="btn btn-primary">+ New Playlist</button>
        </div>
        <nav class="subtab-bar">
          <button class="subtab active" data-subtab="upcoming">Upcoming</button>
          <button class="subtab" data-subtab="past">Past</button>
        </nav>
        <div id="playlist-list"></div>
      </div>
      <div id="playlist-editor-view" class="hidden">
        <button class="back-link" id="editor-back-btn">&larr; Back to playlists</button>
        <div id="playlist-editor"></div>
      </div>
      <div id="playlist-display-view" class="hidden">
        <button class="back-link" id="display-back-btn">&larr; Back to playlists</button>
        <div id="playlist-display"></div>
      </div>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
