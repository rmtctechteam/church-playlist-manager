schema: spec-driven

context: |
  Tech stack: Node.js backend, simple HTML/JS frontend, file-based storage
  Domain: Church music team playlist management
  Songs stored as .txt files in songs/ directory
  Playlists and usage data stored in data/ directory

rules:
  design:
    - If the change modifies the playlist data model (adds, removes, or renames fields on playlists or playlist songs), document the migration strategy — show the old shape vs new shape and specify the version bump.
  tasks:
    - If the change modifies the playlist data model (adds, removes, or renames fields on playlists or playlist songs), include a task to update the migrate(data) function in src/playlistStore.js with a new version block.
